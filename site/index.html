<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yaml-rs online</title>
    <link
      rel="icon"
      href="https://avatars.githubusercontent.com/u/223430533?s=400&u=0377eeb0ae405c2ff4c719f650c36b0e699dedd4&v=4"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github.min.css"
    />
  </head>
  <body>
    <main class="frame">
      <header class="head">
        <div class="head-inner">
          <span class="brand">yaml-rs</span>
          <div class="links">
            <a
              class="link"
              href="https://github.com/lava-sh/yaml-rs"
              target="_blank"
              rel="noreferrer noopener"
            >
              <img class="icon" src="https://cdn.simpleicons.org/github/1e1a17" alt="GitHub" />
              <span>GitHub</span>
            </a>
            <a
              class="link"
              href="https://pypi.org/project/yaml-rs/"
              target="_blank"
              rel="noreferrer noopener"
            >
              <img class="icon" src="https://cdn.simpleicons.org/pypi/3775A9" alt="PyPI" />
              <span>PyPI</span>
            </a>
          </div>
        </div>
      </header>

      <section id="split" class="split">
        <article class="panel panel-left">
          <div class="panel-head">
            <h2 class="label">YAML</h2>
            <button
              id="copyYamlBtn"
              class="copy-btn"
              type="button"
              aria-label="Copy YAML"
              title="Copy YAML"
            >
              <svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                />
              </svg>
              <svg class="check-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 16.2-3.5-3.6L4 14l5 5 11-11-1.5-1.4L9 16.2Z" />
              </svg>
            </button>
          </div>
          <label for="yamlInput" class="sr-only">YAML input</label>
          <div class="editor-wrap">
            <pre id="yamlHighlight" class="hljs yaml-highlight" aria-hidden="true"></pre>
            <textarea id="yamlInput">
# Paste YAML here:
name: lava
items:
  - 1
  - 2
  - deep:
      enabled: true
meta:
  ratio: 12.5
  tag: null
</textarea
            >
          </div>
        </article>

        <div
          id="divider"
          class="divider"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize panels"
        ></div>

        <article class="panel panel-right">
          <div class="panel-head">
            <h2 class="label">Python</h2>
            <button
              id="copyOutputBtn"
              class="copy-btn"
              type="button"
              aria-label="Copy output"
              title="Copy output"
            >
              <svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                />
              </svg>
              <svg class="check-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 16.2-3.5-3.6L4 14l5 5 11-11-1.5-1.4L9 16.2Z" />
              </svg>
            </button>
          </div>
          <pre id="output"></pre>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/yaml.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
