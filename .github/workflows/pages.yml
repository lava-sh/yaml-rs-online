name: "Build And Deploy Pages"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Download yaml-rs wheel for Pyodide"
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/site/wheels"
          curl -fL \
            "https://github.com/lava-sh/yaml-rs/releases/download/0.0.15/yaml_rs-0.0.15-cp313-cp313-emscripten_4_0_9_wasm32.whl" \
            -o "$GITHUB_WORKSPACE/site/wheels/yaml_rs-0.0.15-cp313-cp313-emscripten_4_0_9_wasm32.whl"

      - name: "Upload Pages artifact"
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
