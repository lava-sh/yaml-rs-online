name: "Build And Deploy Pages"

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Build yaml-rs Wheel"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "Read pinned yaml-rs commit"
        id: pin
        shell: bash
        run: |
          set -euxo pipefail
          COMMIT="$(tr -d '\r\n' < .github/yaml-rs-commit.txt)"
          if [[ ! "${COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid commit hash in .github/yaml-rs-commit.txt: ${COMMIT}" >&2
            exit 1
          fi
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "tag=yaml-rs-wheel-${COMMIT}" >> "$GITHUB_OUTPUT"

      - name: "Download prebuilt wheel from release"
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p site/wheels
          rm -f site/wheels/*.whl site/wheels/latest.txt
          gh release download "${{ steps.pin.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.whl" \
            --pattern "latest.txt" \
            --dir site/wheels

      - name: "Upload Pages artifact"
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
